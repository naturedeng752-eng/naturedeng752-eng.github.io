<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - Nature</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title">Nature</h1>
            <p class="site-subtitle">wellcome</p>
        </div>
    </header>

    <main class="container">
        <div id="post-container">
            <div class="loading">加载中...</div>
        </div>

        <div id="post-interaction" class="interaction-bar reveal">
            <button id="like-btn" class="interaction-btn" onclick="handleLike()">
                <span id="like-icon">♡</span>
                <span id="like-count">0</span>
            </button>
            <div class="interaction-info">
                <span>阅读 <span id="view-count">0</span></span>
            </div>
        </div>

        <div id="comments-section" class="comments-section reveal">
            <div class="giscus-loading">加载评论区...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Nature</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
